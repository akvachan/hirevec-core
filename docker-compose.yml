services:
  postgres:
    image: postgres:18.1
    container_name: hirevec_postgres 
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}

    ports:
      - "${PG_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - deployment/dev-init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
